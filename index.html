<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아몬드 베이커리 - 물 온도 계산기</title>
    <style>
        /* [색상 테마 설정] */
        :root {
            --primary-brown: #8d6e63;    /* 따뜻한 우드톤 */
            --dark-brown: #5d4037;       /* 진한 포인트 브라운 */
            --light-beige: #efebe9;      /* 연한 베이지 */
            --bg-cream: #faf8f6;         /* 전체 배경 크림색 */
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #4e342e; /* 텍스트도 진한 갈색톤으로 변경 */
        }

        .container {
            background: var(--white);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(141, 110, 99, 0.1);
            width: 100%;
            max-width: 380px;
            margin: 20px;
        }

        /* 로고 영역 */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .profile-logo {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--light-beige);
            background-color: var(--light-beige);
            https://raw.githubusercontent.com/DavidJeon1229/Sourdough-Temp-Calc/refs/heads/main/%E1%84%8B%E1%85%A1%E1%84%86%E1%85%A9%E1%86%AB%E1%84%83%E1%85%B3%20%E1%84%87%E1%85%A6%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A5%E1%84%85%E1%85%B5%20%E1%84%85%E1%85%A9%E1%84%80%E1%85%A9.png
            /* 여기에 이미지 주소를 넣으세요 */
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 1.8rem;
            color: var(--dark-brown);
            letter-spacing: -0.5px;
        }

        /* 모드 선택 탭 */
        .tabs {
            display: flex;
            background: var(--light-beige);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            color: #888;
        }
        .tab.active {
            background: var(--white);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            color: var(--primary-brown);
        }

        /* 입력창 스타일 */
        .input-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--dark-brown);
        }
        input {
            width: 100%;
            padding: 0.7rem;
            border: 1.5px solid var(--light-beige);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fff;
            transition: border-color 0.2s;
            color: var(--dark-brown);
        }
        input:focus {
            outline: none;
            border-color: var(--primary-brown);
        }

        /* 마찰계수 버튼 */
        .btn-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }
        .btn-group button {
            flex: 1;
            padding: 0.6rem;
            border: 1.5px solid var(--primary-brown);
            background: var(--white);
            color: var(--primary-brown);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-group button.active {
            background: var(--primary-brown);
            color: var(--white);
        }

        /* 결과창 스타일 */
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--light-beige);
            border-radius: 15px;
            text-align: center;
        }
        .result-label {
            font-size: 0.85rem;
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-brown);
        }

        .hidden { display: none; }
        
        /* 푸터 스타일 */
        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #bcaaa4;
            text-align: center;
            border-top: 1px solid var(--light-beige);
            padding-top: 1.5rem;
        }
        .brand-name {
            margin-bottom: 12px;
            display: block;
            font-weight: 600;
            color: var(--primary-brown);
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
        }
        .social-icon {
            width: 26px;
            height: 26px;
            fill: #d7ccc8; /* 기본 아이콘 색상 */
            transition: all 0.3s ease;
        }
        .social-link:hover .icon-yt { fill: #FF0000; } /* 유튜브 레드 */
        .social-link:hover .icon-ig { fill: #E4405F; } /* 인스타 핑크 */
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <img src="프로필_이미지_주소" alt="Almond Bakery" class="profile-logo" onerror="this.style.display='none'">
    </div>

    <h1>물 온도 계산기</h1>

    <div class="tabs">
        <div id="tabLevain" class="tab active" onclick="setMode('levain')">르방 사용</div>
        <div id="tabYeast" class="tab" onclick="setMode('yeast')">이스트 사용</div>
    </div>
    
    <div class="input-group">
        <label>희망 반죽 온도 (°C)</label>
        <input type="number" id="targetTemp" value="24" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>실내 온도 (°C)</label>
        <input type="number" id="roomTemp" value="23" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>밀가루 온도 (°C)</label>
        <input type="number" id="flourTemp" value="23" step="0.1" oninput="calculate()">
    </div>

    <div class="input-group" id="levainInputGroup">
        <label>르방 온도 (°C)</label>
        <input type="number" id="levainTemp" value="23" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>마찰계수 (손반죽: 3, 반죽기: 8)</label>
        <input type="number" id="friction" value="3" step="0.1" oninput="calculate()">
        <div class="btn-group">
            <button id="btnHand" class="active" onclick="setFriction(3, 'btnHand')">손반죽</button>
            <button id="btnMachine" onclick="setFriction(8, 'btnMachine')">반죽기</button>
        </div>
    </div>

    <div class="result-box">
        <div class="result-label">필요한 물 온도</div>
        <div class="result-value" id="result">0.0 °C</div>
    </div>

    <footer>
        <span class="brand-name">by Almond Bakery</span>
        <div class="social-links">
            <a href="https://www.youtube.com/@almondbakery1121" target="_blank" class="social-link">
                <svg class="social-icon icon-yt" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="https://www.instagram.com/almond_bakery_1121/" target="_blank" class="social-link">
                <svg class="social-icon icon-ig" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.981 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
            </a>
        </div>
    </footer>
</div>

<script>
    let currentMode = 'levain';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('tabLevain').classList.toggle('active', mode === 'levain');
        document.getElementById('tabYeast').classList.toggle('active', mode === 'yeast');
        
        const levainGroup = document.getElementById('levainInputGroup');
        if (mode === 'yeast') {
            levainGroup.classList.add('hidden');
        } else {
            levainGroup.classList.remove('hidden');
        }
        calculate();
    }

    function setFriction(value, btnId) {
        document.getElementById('friction').value = value;
        document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        calculate();
    }

    function calculate() {
        const target = parseFloat(document.getElementById('targetTemp').value) || 0;
        const room = parseFloat(document.getElementById('roomTemp').value) || 0;
        const flour = parseFloat(document.getElementById('flourTemp').value) || 0;
        const friction = parseFloat(document.getElementById('friction').value) || 0;

        let waterTemp = 0;

        if (currentMode === 'levain') {
            const levain = parseFloat(document.getElementById('levainTemp').value) || 0;
            waterTemp = (target * 4) - (room + flour + levain + friction);
        } else {
            waterTemp = (target * 3) - (room + flour + friction);
        }
        
        document.getElementById('result').innerText = waterTemp.toFixed(1) + " °C";
    }

    window.onload = calculate;
</script>

</body>
</html>
