<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사워도우 & 이스트 물 온도 계산기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }
        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #2c3e50;
        }
        /* 모드 선택 탭 */
        .tabs {
            display: flex;
            background: #eee;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .tab.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #007bff;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #666;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-group button {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-group button.active {
            background: #007bff;
            color: white;
        }
        .result-box {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: #e7f3ff;
            border-radius: 8px;
            text-align: center;
        }
        .result-label {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.3rem;
        }
        .result-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #007bff;
        }
        .hidden { display: none; }
        footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>물 온도 계산기</h1>

    <div class="tabs">
        <div id="tabLevain" class="tab active" onclick="setMode('levain')">르방 사용</div>
        <div id="tabYeast" class="tab" onclick="setMode('yeast')">이스트 사용</div>
    </div>
    
    <div class="input-group">
        <label>희망 반죽 온도 (°C)</label>
        <input type="number" id="targetTemp" value="24" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>실내 온도 (°C)</label>
        <input type="number" id="roomTemp" value="23" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label>밀가루 온도 (°C)</label>
        <input type="number" id="flourTemp" value="23" step="0.1" oninput="calculate()">
    </div>

    <div class="input-group" id="levainInputGroup">
        <label>르방 온도 (°C)</label>
        <input type="number" id="levainTemp" value="23" step="0.1" oninput="calculate()">
    </div>
    
    <div class="input-group">
        <label id="frictionLabel">마찰계수 (손반죽: 3, 반죽기: 8)</label>
        <input type="number" id="friction" value="3" step="0.1" oninput="calculate()">
        <div class="btn-group">
            <button id="btnHand" class="active" onclick="setFriction(3, 'btnHand')">손반죽</button>
            <button id="btnMachine" onclick="setFriction(8, 'btnMachine')">반죽기</button>
        </div>
    </div>

    <div class="result-box">
        <div class="result-label">필요한 물 온도</div>
        <div class="result-value" id="result">0.0 °C</div>
    </div>

    <footer>
        * 환경에 맞는 모드를 선택하여 사용하세요.<br>
        by Almond Bakery
    </footer>
</div>

<script>
    let currentMode = 'levain';

    function setMode(mode) {
        currentMode = mode;
        
        // 탭 스타일 변경
        document.getElementById('tabLevain').classList.toggle('active', mode === 'levain');
        document.getElementById('tabYeast').classList.toggle('active', mode === 'yeast');
        
        // 르방 온도 입력창 표시 여부
        const levainGroup = document.getElementById('levainInputGroup');
        if (mode === 'yeast') {
            levainGroup.classList.add('hidden');
        } else {
            levainGroup.classList.remove('hidden');
        }
        
        calculate();
    }

    function setFriction(value, btnId) {
        document.getElementById('friction').value = value;
        document.querySelectorAll('.btn-group button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        calculate();
    }

    function calculate() {
        const target = parseFloat(document.getElementById('targetTemp').value) || 0;
        const room = parseFloat(document.getElementById('roomTemp').value) || 0;
        const flour = parseFloat(document.getElementById('flourTemp').value) || 0;
        const friction = parseFloat(document.getElementById('friction').value) || 0;

        let waterTemp = 0;

        if (currentMode === 'levain') {
            // 르방 모드: (희망온도 * 4) - (실내 + 밀가루 + 르방 + 마찰)
            const levain = parseFloat(document.getElementById('levainTemp').value) || 0;
            waterTemp = (target * 4) - (room + flour + levain + friction);
        } else {
            // 이스트 모드: (희망온도 * 3) - (실내 + 밀가루 + 마찰)
            waterTemp = (target * 3) - (room + flour + friction);
        }
        
        document.getElementById('result').innerText = waterTemp.toFixed(1) + " °C";
    }

    window.onload = calculate;
</script>

</body>
</html>
